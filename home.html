<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyUI  -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- tailwindcss -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
<body class="w-[450px] w-11/12  mx-auto ">
    <header class="flex justify-between items-center p-11">
        <div class="flex gap-2">
            <div class="w-[60px]">
                <img src="./assets/logo.png" alt="">
            </div>
            <div class="">
                <h1 class="text-[18px] font-extrabold mb-1.5">$ <span>4500</span></h1>
                <p class="text-[14px] text-neutral/50 ">Available balance</p>
            </div>
        </div>
        <div class="">
            <a href="./index.html" class="btn border-2 border-neutral/10 rounded-[8px]">
                <i class="fa-solid text-neutral/50 fa-arrow-right-from-bracket"></i>
                <p class="text-neutral/50">Logout</p>
            </a>
        </div>
    </header>

    <section class="w-[402px] rounded-[24px]   mx-auto pb-6 mt-8">
        <h1 class="font-bold text-[24px] mb-4">Welcome to Pay<span class="text-primary">oo</span></h1>
        <p class="text-base text-neutral/50 leading-6">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="mt-6 grid grid-cols-3 gap-4 ">
            <div class="">
                <button class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-1.png" alt="">
                <p class="text-[14px] text-neutral/70">Add Money</p></button>
            </div>
            <div class="">
                <button id="cash-out-btn" class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-2.png" alt="">
                <p class="text-[14px] text-neutral/70">Cashout</p></button>
            </div>
            <div class="">
                <button class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-3.png" alt="">
                <p class="text-[14px] text-neutral/70">Transfer Money</p></button>
            </div>
            <div class="">
                <button class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-4.png" alt="">
                <p class="text-[14px] text-neutral/70">Get Bonus</p></button>
            </div>
            <div class="">
                <button class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-5.png" alt="">
                <p class="text-[14px] text-neutral/70">Pay Bill</p></button>
            </div>
            <div class="">
                <button class="btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px]  py-5 px-6 flex-col ">
                <img class="w-6 h-6 mx-auto" src="./assets/opt-6.png" alt="">
                <p class="text-[14px] text-neutral/70">Transactions</p></button>
            </div>
           
        </div>
    </section>

    <section id="cash-out-section" class="opacity-0 invisible transition-all duration-500 ease-in-out mt-6 p-6 bg-base-300 rounded-[24px]">
      <h1 class="text-[18px] font-semibold text-neutral/90">Cash Out</h1>
        <div class="card bg-base-100 w-full rounded-[24px] mt-8   shadow-sm mx-auto ">
      <div class="card-body ">
        <fieldset class="fieldset">
          <label class="label text-base text-neutral font-semibold"
            >Agent Number</label
          >
          <input
            id="cashout-number"
            minlength="11"
            maxlength="11"
            type="text"
            class="input border-none mb-4 bg-base-300 rounded-full"
            placeholder="Enter 11 digit number"
          />
          <label class="label text-base text-neutral font-semibold"
            >Amount</label
          >
          <input
            id="cashout-amount"
            minlength="4"
            maxlength="4"
            type="password"
            class="input border-none mb-4 bg-base-300 rounded-full"
            placeholder="Enter amount to withdraw"
          />
          <label class="label text-base text-neutral font-semibold"
            >Pin Number</label
          >
          <input
            id="cashout-pin"
            minlength="4"
            maxlength="4"
            type="password"
            class="input border-none mb-4 bg-base-300 rounded-full"
            placeholder="Enter 4 digit pin number"
          />

          <button
            id="cashout-btn"
            class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
          >
            Withdraw Money
          </button>
        </fieldset>
      </div>
    </div>
    </section>
    <script src="./script/cashout.js"></script>
</body>
</html>
