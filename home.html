<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyUI  -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- tailwindcss -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="w-[450px] w-11/12 mx-auto">
    <header class="flex justify-between items-center p-11">
      <div class="flex gap-2">
        <div class="w-[60px]">
          <img src="./assets/logo.png" alt="" />
        </div>
        <div class="">
          <h1 class="text-[18px] font-extrabold mb-1.5">
            $ <span id="current-amount">4500</span>
          </h1>
          <p class="text-[14px] text-neutral/50">Available balance</p>
        </div>
      </div>
      <div class="">
        <a
          href="./index.html"
          class="btn border-2 border-neutral/10 rounded-[8px]"
        >
          <i class="fa-solid text-neutral/50 fa-arrow-right-from-bracket"></i>
          <p class="text-neutral/50">Logout</p>
        </a>
      </div>
    </header>

    <section class="w-[402px] rounded-[24px] mx-auto pb-6 mt-8">
      <h1 class="font-bold text-[24px] mb-4">
        Welcome to Pay<span class="text-primary">oo</span>
      </h1>
      <p class="text-base text-neutral/50 leading-6">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>

      <!-- button section  -->

      <div class="mt-6 grid grid-cols-3 gap-4">
        <div class="">
          <button data-id="addMoney-section"
            id="addmoney-section-btn"
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-1.png" alt="" />
            <p class="text-[14px] text-neutral/70">Add Money</p>
          </button>
        </div>
        <div class="">
          <button data-id="cash-out-section"
            id="cash-out-btn"
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-2.png" alt="" />
            <p class="text-[14px] text-neutral/70">Cashout</p>
          </button>
        </div>
        <div class="">
          <button data-id="Transfer-Money-section"
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-3.png" alt="" />
            <p class="text-[14px] text-neutral/70">Transfer Money</p>
          </button>
        </div>
        <div class="">
          <button data-id="Bonus-section"
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-4.png" alt="" />
            <p class="text-[14px] text-neutral/70">Get Bonus</p>
          </button>
        </div>
        <div class="">
          <button data-id="Pay-Bill-section"
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-5.png" alt="" />
            <p class="text-[14px] text-neutral/70">Pay Bill</p>
          </button>
        </div>
        <div class="">
          <button
            class="btn-tab btn btn-soft border-1 border-neutral/10 rounded-[12px] w-[123px] rounded-3 h-[90px] py-5 px-6 flex-col"
          >
            <img class="w-6 h-6 mx-auto" src="./assets/opt-6.png" alt="" />
            <p class="text-[14px] text-neutral/70">Transactions</p>
          </button>
        </div>
      </div>
    </section>

    <!-- addMoney-section -->

    <section
      id="addMoney-section"
      class="hidden mt-6 p-6 bg-base-300 rounded-[24px]"
    >
      <h1 class="text-[18px] font-semibold text-neutral/90">Add Money</h1>
      <div
        class="card bg-base-100 mx-auto rounded-[24px] mt-8 shadow-sm mx-auto"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-base text-neutral/70 font-semibold"
              >Select A Bank</label
            >
            <select id="select-bank" class="select text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full">
              <option disabled selected ">Select Bank</option>
              <option value="Janata">Janata Bank</option>
              <option value="Agrani">Agrani Bank</option>
              <option value="Islami">Islami Bank</option>
            </select>
            <label class="label text-base text-neutral/70 font-semibold"
              >Bank Account Number</label
            >
            <input
              id="Bank-Number"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 11 digit account number"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Amount to Add</label
            >
            <input
              id="Add-Money-amount"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter amount to Add"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Pin Number</label
            >
            <input
              id="Add-Money-pin"
              minlength="4"
              maxlength="4"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="addMoney-btn"
              class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
            >
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

<!-- cash-out-section -->

    <section
      id="cash-out-section"
      class="hidden mt-6 p-6 bg-base-300 rounded-[24px]"
    >
      <h1 class="text-[18px] font-semibold text-neutral/90">Cash Out</h1>
      <div
        class="card bg-base-100 mx-auto rounded-[24px] mt-8 shadow-sm mx-auto"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-base text-neutral/70 font-semibold"
              >Agent Number</label
            >
            <input
              id="cashout-number"
              minlength="11"
              maxlength="11"
              type="text"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 11 digit number"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Amount</label
            >
            <input
              id="cash-out-amount"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter amount to withdraw"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Pin Number</label
            >
            <input
              id="cashout-pin"
              minlength="4"
              maxlength="4"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="cashout-btn"
              class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
            >
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

<!-- Transfer-Money-section -->

    <section
      id="Transfer-Money-section"
      class="hidden mt-6 p-6 bg-base-300 rounded-[24px]"
    >
      <h1 class="text-[18px] font-semibold text-neutral/90">Transfer Money</h1>
      <div
        class="card bg-base-100 mx-auto rounded-[24px] mt-8 shadow-sm mx-auto"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-base text-neutral/70 font-semibold"
              >User Account Number</label
            >
            <input
              id="Transfer-Money-number"
              minlength="11"
              maxlength="11"
              type="text"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 11 digit number"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Amount</label
            >
            <input
              id="Transfer-Money-amount"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter amount to transfer"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Pin Number</label
            >
            <input
              id="Transfer-Money-pin"
              minlength="4"
              maxlength="4"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="Send-Now-btn"
              class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
            >
              Send Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>

<!-- Bonus-section -->

    <section
      id="Bonus-section"
      class="hidden mt-6 p-6 bg-base-300 rounded-[24px]"
    >
      <h1 class="text-[18px] font-semibold text-neutral/90">Get Bonus</h1>
      <div
        class="card bg-base-100 mx-auto rounded-[24px] mt-8 shadow-sm mx-auto"
      >
        <div class="card-body">
          <fieldset class="fieldset">
          
            <label class="label text-base text-neutral/70 font-semibold"
              >Enter Coupon Card</label
            >
            <input
              id="Coupon"
              minlength="6"
              maxlength="6"
              type="password"
              class="input w-full border-none mb-4 text-base my-2  bg-base-300 rounded-full"
              placeholder="Get Your Bonus"
            />

            <button
              id="bonus-btn"
              class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
            >
              Get Bonus
            </button>
          </fieldset>
        </div>
      </div>
    </section>

<!-- Pay Bill section  -->

    <section
      id="Pay-Bill-section"
      class="hidden mt-6 p-6 bg-base-300 rounded-[24px]"
    >
      <h1 class="text-[18px] font-semibold text-neutral/90">Pay Bill</h1>
      <div
        class="card bg-base-100 mx-auto rounded-[24px] mt-8 shadow-sm mx-auto"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-base text-neutral/70 font-semibold"
              >Select To Pay</label
            >
            <select id="Pay-Bill-bank" class="select text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full">
              <option disabled selected ">Select Bank</option>
              <option value="Janata">Janata Bank</option>
              <option value="Agrani">Agrani Bank</option>
              <option value="Islami">Islami Bank</option>
            </select>
            <label class="label text-base text-neutral/70 font-semibold"
              >Biller Account Number</label
            >
            <input
              id="Pay-Bill-Number"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter account number"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Amount to Pay</label
            >
            <input
              id="Pay-Bill-amount"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Pay Amount"
            />
            <label class="label text-base text-neutral/70 font-semibold"
              >Pin Number</label
            >
            <input
              id="Pay-Bill-pin"
              minlength="4"
              maxlength="4"
              type="password"
              class="input text-base my-2 w-full border-none mb-4 bg-base-300 rounded-full"
              placeholder="Enter 4 digit pin number"
            />

            <button
              id="Pay-btn"
              class="btn btn-neutral mt-4 border-none rounded-full font-semibold text-[20px] bg-blue-700"
            >
              Pay Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <script src="./script/machine.js"></script>
    <script src="./script/cashout.js"></script>
  </body>
</html>
